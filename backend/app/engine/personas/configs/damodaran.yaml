name: damodaran
agent_id: damodaran_analyst
display_name: Aswath Damodaran
philosophy: Intrinsic valuation and cash-flow discipline.
rules:
  - type: ratio
    num: free_cash_flow
    denom_source: details
    denom: market_cap
    scale: 100
    needs: {financials: 1, prices: true}
    branches:
      - {op: ">", value: 6, bull: 2, label: "High FCF yield ({v:.1f}%) — undervalued"}
      - {op: "<", value: 1, bear: 1, label: "Low FCF yield ({v:.1f}%)"}
  - type: threshold
    field: debt_to_equity
    needs: {financials: 1, prices: true}
    branches:
      - {op: "<", value: 0.8, bull: 1, label: "Efficient capital structure"}
  - type: ratio
    num: net_income
    denom: revenue
    scale: 100
    needs: {financials: 1, prices: true}
    branches:
      - {op: ">", value: 20, bull: 1, label: "Strong margin ({v:.0f}%)"}
      - {op: "<", value: 0, bear: 2, label: "Unprofitable"}
