# PortAI — two services: FastAPI backend + Next.js frontend.
# Copy .env.example values into a .env (or export them) before `docker compose up`.
services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    environment:
      # All optional — the pipeline runs without an LLM key (memo is skipped),
      # and without Telegram (no push). See TRANSFORM.md §4.4 and backend/.env.example.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Persist the SQLite DB (cache + fund + decisions) in the named volume.
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/portai.db}
    volumes:
      - portai-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/meta/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
      args:
        # Build-time: inlined into the client bundle (Next.js NEXT_PUBLIC_*).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  portai-data:
